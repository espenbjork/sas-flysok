<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS-flysøk</title>
<style>
  :root {
    --sas-blue: #000f3c;
    --sas-blue-light: #1a2b5e;
    --accent: #006ee8;
    --bg: #f4f6fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2e6ee;
    --ok: #0a7d33;
    --warn: #b45309;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    background: var(--sas-blue); color: #fff; padding: 28px 24px;
  }
  header .inner { max-width: 960px; margin: 0 auto; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.02em; }
  header p { color: #b8c2dd; margin-top: 4px; font-size: 0.95rem; }
  main { max-width: 960px; margin: 0 auto; padding: 24px 16px 64px; }

  .panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: grid; gap: 16px;
    grid-template-columns: 2fr 1fr 1fr auto auto; align-items: end;
    box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
  }
  .panel > div { min-width: 0; }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  select, input[type="date"], input[type="search"] {
    width: 100%; padding: 9px 10px; font-size: 1rem;
    border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text);
  }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    padding: 9px 14px; font-size: 0.9rem; border: none; background: #fff; cursor: pointer; color: var(--muted); white-space: nowrap;
  }
  .seg button.active { background: var(--sas-blue); color: #fff; }
  #search {
    padding: 10px 22px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; cursor: pointer;
  }
  #search:hover { background: #0059c2; }
  #search:disabled { background: #9db8d8; cursor: wait; }

  .filterbar {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-top: 16px; display: none;
  }
  .filterbar.visible { display: block; }
  .filterbar .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filterbar input[type="search"] { max-width: 280px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    border: 1px solid var(--border); background: #fff; color: var(--muted);
    padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; user-select: none;
  }
  .chip.active { background: #e8f1fd; border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .chip .n { opacity: 0.7; font-weight: 400; }
  .chip-tools { margin-left: auto; display: flex; gap: 10px; }
  .chip-tools button { border: none; background: none; color: var(--accent); font-size: 0.82rem; cursor: pointer; }

  .status { margin: 18px 2px; font-size: 0.95rem; color: var(--muted); }
  .warning {
    background: #fef3cd; border: 1px solid #f5d0a0; color: var(--warn);
    padding: 10px 14px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem;
  }
  .summary { display: flex; justify-content: space-between; align-items: center; margin: 20px 2px 10px; flex-wrap: wrap; gap: 8px; }
  .summary strong { font-size: 1.05rem; }
  #csv {
    padding: 7px 14px; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; cursor: pointer; color: var(--text);
  }
  #csv:hover { border-color: var(--accent); color: var(--accent); }

  .day { margin-top: 22px; }
  .day h2 {
    font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin-bottom: 8px; padding: 6px 2px;
    position: sticky; top: 0; background: var(--bg); z-index: 1;
  }
  table {
    width: 100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  th {
    text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); padding: 10px 14px; background: #fafbfd; border-bottom: 1px solid var(--border);
  }
  td { padding: 11px 14px; font-size: 0.93rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  td.time { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  td.flight { font-weight: 600; color: var(--sas-blue); white-space: nowrap; }
  .dir-badge { font-size: 0.78rem; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .dir-d { background: #e8f1fd; color: var(--accent); }
  .dir-a { background: #efe9fb; color: #6d4bc4; }
  .st { font-size: 0.82rem; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .st-ok { background: #e7f6ec; color: var(--ok); }
  .st-plan { background: #eef2f7; color: var(--muted); }
  .st-bad { background: #fde8e8; color: var(--bad); }
  .price-link { color: var(--accent); text-decoration: none; font-size: 0.82rem; white-space: nowrap; }
  .price-link:hover { text-decoration: underline; }
  td.price-na { color: var(--muted); }
  .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
  footer { max-width: 960px; margin: 0 auto; padding: 0 16px 32px; font-size: 0.8rem; color: var(--muted); }

  @media (max-width: 760px) {
    .panel { grid-template-columns: 1fr 1fr; }
    .panel .field-airport, .panel .field-dir, #search { grid-column: 1 / -1; }
    .seg { display: flex; }
    .seg button { flex: 1; }
    .day { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .day h2 { position: static; }
    td, th { padding: 8px 8px; }
    .filterbar input[type="search"] { max-width: none; width: 100%; }
    .chip-tools { margin-left: 0; }
  }
</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>SAS-flysøk</h1>
    <p>Alle SAS-flygninger fra valgt flyplass i perioden du velger</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="field-airport">
      <label for="airport">Flyplass</label>
      <select id="airport">
        <optgroup label="Norge (Avinor, inntil 14 dager frem)">
          <option value="OSL" selected>Oslo lufthavn (OSL)</option>
          <option value="BGO">Bergen (BGO)</option>
          <option value="TRD">Trondheim (TRD)</option>
          <option value="SVG">Stavanger (SVG)</option>
          <option value="TOS">Tromsø (TOS)</option>
          <option value="BOO">Bodø (BOO)</option>
          <option value="KRS">Kristiansand (KRS)</option>
          <option value="AES">Ålesund (AES)</option>
          <option value="HAU">Haugesund (HAU)</option>
          <option value="EVE">Harstad/Narvik (EVE)</option>
          <option value="MOL">Molde (MOL)</option>
          <option value="KSU">Kristiansund (KSU)</option>
          <option value="ALF">Alta (ALF)</option>
          <option value="KKN">Kirkenes (KKN)</option>
          <option value="LYR">Longyearbyen (LYR)</option>
        </optgroup>
        <optgroup label="Sverige (Swedavia, inntil 90 dager frem)">
          <option value="ARN">Stockholm Arlanda (ARN)</option>
          <option value="GOT">Göteborg Landvetter (GOT)</option>
          <option value="MMX">Malmö (MMX)</option>
          <option value="LLA">Luleå (LLA)</option>
          <option value="UME">Umeå (UME)</option>
          <option value="OSD">Åre Östersund (OSD)</option>
          <option value="VBY">Visby (VBY)</option>
          <option value="KRN">Kiruna (KRN)</option>
        </optgroup>
        <optgroup label="Danmark (krever AeroDataBox-nøkkel)">
          <option value="CPH">København (CPH)</option>
          <option value="BLL">Billund (BLL)</option>
          <option value="AAL">Aalborg (AAL)</option>
        </optgroup>
      </select>
    </div>
    <div>
      <label for="from">Fra dato</label>
      <input type="date" id="from">
    </div>
    <div>
      <label for="to">Til dato</label>
      <input type="date" id="to">
    </div>
    <div class="field-dir">
      <label>Retning</label>
      <div class="seg">
        <button id="dir-d" class="active" type="button">Avganger</button>
        <button id="dir-a" type="button">Ankomster</button>
        <button id="dir-b" type="button">Begge</button>
      </div>
    </div>
    <button id="search" type="button">Søk</button>
  </div>

  <div class="filterbar" id="filterbar">
    <div class="row">
      <input type="search" id="destfilter" placeholder="Filtrer på destinasjon eller flightnummer …">
      <div class="chip-tools">
        <button id="chips-all" type="button">Vis alle</button>
        <button id="chips-none" type="button">Skjul alle</button>
      </div>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="messages"></div>
  <div id="results"></div>
</main>

<footer>
  Data: Avinor (Norge), Swedavia (Sverige), AeroDataBox (Danmark). Tider vises i lokal tid (Europe/Oslo).
  Viser flygninger med SK-flightnummer (inkl. SAS Link/Connect), ikke codeshare på andre selskap.
</footer>

<script>
// IATA-kode: [visningsnavn, ISO-landkode]
const AIRPORTS = {
  // Norge
  OSL:['Oslo','NO'], BGO:['Bergen','NO'], TRD:['Trondheim','NO'], SVG:['Stavanger','NO'],
  TOS:['Tromsø','NO'], BOO:['Bodø','NO'], KRS:['Kristiansand','NO'], AES:['Ålesund','NO'],
  HAU:['Haugesund','NO'], EVE:['Harstad/Narvik','NO'], MOL:['Molde','NO'], KSU:['Kristiansund','NO'],
  ALF:['Alta','NO'], KKN:['Kirkenes','NO'], LYR:['Longyearbyen','NO'], BDU:['Bardufoss','NO'],
  TRF:['Oslo Torp','NO'], HFT:['Hammerfest','NO'], LKL:['Lakselv','NO'], BJF:['Båtsfjord','NO'], VDS:['Vadsø','NO'],
  // Sverige
  ARN:['Stockholm','SE'], BMA:['Stockholm Bromma','SE'], GOT:['Göteborg','SE'], MMX:['Malmö','SE'],
  LLA:['Luleå','SE'], UME:['Umeå','SE'], OSD:['Åre Östersund','SE'], VBY:['Visby','SE'],
  KRN:['Kiruna','SE'], RNB:['Ronneby','SE'], SFT:['Skellefteå','SE'], KLR:['Kalmar','SE'],
  AGH:['Ängelholm','SE'], HAD:['Halmstad','SE'], VXO:['Växjö','SE'],
  // Danmark
  CPH:['København','DK'], BLL:['Billund','DK'], AAL:['Aalborg','DK'], AAR:['Aarhus','DK'],
  // Norden ellers
  HEL:['Helsinki','FI'], KEF:['Reykjavik','IS'], FAE:['Færøyene','FO'],
  SFJ:['Kangerlussuaq','GL'], GOH:['Nuuk','GL'],
  // Storbritannia og Irland
  LHR:['London Heathrow','GB'], LGW:['London Gatwick','GB'], MAN:['Manchester','GB'],
  EDI:['Edinburgh','GB'], ABZ:['Aberdeen','GB'], DUB:['Dublin','IE'],
  // Vest-Europa
  FRA:['Frankfurt','DE'], MUC:['München','DE'], DUS:['Düsseldorf','DE'], HAM:['Hamburg','DE'], BER:['Berlin','DE'],
  AMS:['Amsterdam','NL'], BRU:['Brussel','BE'], LUX:['Luxembourg','LU'],
  CDG:['Paris','FR'], NCE:['Nice','FR'],
  ZRH:['Zürich','CH'], GVA:['Genève','CH'],
  VIE:['Wien','AT'], SZG:['Salzburg','AT'], INN:['Innsbruck','AT'], GRZ:['Graz','AT'],
  // Sør-Europa og Middelhavet
  MAD:['Madrid','ES'], BCN:['Barcelona','ES'], AGP:['Málaga','ES'], ALC:['Alicante','ES'],
  PMI:['Palma de Mallorca','ES'], LPA:['Las Palmas','ES'], TFS:['Tenerife','ES'],
  SVQ:['Sevilla','ES'], VLC:['Valencia','ES'], BIO:['Bilbao','ES'],
  LIS:['Lisboa','PT'], FAO:['Faro','PT'], OPO:['Porto','PT'], FNC:['Funchal','PT'],
  FCO:['Roma','IT'], MXP:['Milano','IT'], VCE:['Venezia','IT'], NAP:['Napoli','IT'],
  PSA:['Pisa','IT'], FLR:['Firenze','IT'], OLB:['Olbia','IT'], CTA:['Catania','IT'], PMO:['Palermo','IT'],
  ATH:['Athen','GR'], CHQ:['Chania','GR'], HER:['Heraklion','GR'], RHO:['Rhodos','GR'],
  KGS:['Kos','GR'], CFU:['Korfu','GR'], JTR:['Santorini','GR'], ZTH:['Zakynthos','GR'],
  JSI:['Skiathos','GR'], SMI:['Samos','GR'], IOA:['Ioannina','GR'], AOK:['Karpathos','GR'],
  MJT:['Mytilini (Lesvos)','GR'], KLX:['Kalamata','GR'], PVK:['Preveza','GR'],
  SPU:['Split','HR'], DBV:['Dubrovnik','HR'], PUY:['Pula','HR'],
  TIV:['Tivat','ME'], TIA:['Tirana','AL'], MLA:['Malta','MT'], LCA:['Larnaka','CY'],
  IST:['Istanbul','TR'], AYT:['Antalya','TR'], GZP:['Gazipaşa','TR'],
  // Øst- og Sentral-Europa
  WAW:['Warszawa','PL'], GDN:['Gdańsk','PL'], KRK:['Kraków','PL'],
  PRG:['Praha','CZ'], BUD:['Budapest','HU'], OTP:['Bucuresti','RO'], BOJ:['Burgas','BG'],
  TLL:['Tallinn','EE'], RIX:['Riga','LV'], VNO:['Vilnius','LT'],
  BEG:['Beograd','RS'], SKP:['Skopje','MK'], PRN:['Pristina','XK'], SJJ:['Sarajevo','BA'],
  // Utenfor Europa
  EWR:['New York Newark','US'], JFK:['New York JFK','US'], BOS:['Boston','US'],
  ORD:['Chicago','US'], MIA:['Miami','US'], LAX:['Los Angeles','US'], SFO:['San Francisco','US'],
  SEA:['Seattle','US'], IAD:['Washington','US'], ATL:['Atlanta','US'], YYZ:['Toronto','CA'],
  BKK:['Bangkok','TH'], NRT:['Tokyo Narita','JP'], HND:['Tokyo Haneda','JP'],
  PVG:['Shanghai','CN'], ICN:['Seoul','KR'], DOH:['Doha','QA'], DXB:['Dubai','AE'],
  TLV:['Tel Aviv','IL'], DEL:['Delhi','IN']
};

const REGION_DEFS = [
  { key: 'norge',  label: 'Norge' },
  { key: 'skand',  label: 'Skandinavia (SE/DK)' },
  { key: 'norden', label: 'Norden ellers' },
  { key: 'brit',   label: 'Storbritannia & Irland' },
  { key: 'vest',   label: 'Vest-Europa' },
  { key: 'sor',    label: 'Sør-Europa' },
  { key: 'ost',    label: 'Øst- og Sentral-Europa' },
  { key: 'inter',  label: 'Utenfor Europa' },
  { key: 'annet',  label: 'Ukjent' },
];

const COUNTRY_REGION = {
  NO:'norge',
  SE:'skand', DK:'skand',
  FI:'norden', IS:'norden', FO:'norden', GL:'norden',
  GB:'brit', IE:'brit',
  DE:'vest', NL:'vest', BE:'vest', FR:'vest', CH:'vest', AT:'vest', LU:'vest',
  ES:'sor', PT:'sor', IT:'sor', GR:'sor', HR:'sor', ME:'sor', AL:'sor', MT:'sor', CY:'sor', TR:'sor',
  PL:'ost', CZ:'ost', SK:'ost', HU:'ost', RO:'ost', BG:'ost', EE:'ost', LV:'ost', LT:'ost',
  RS:'ost', MK:'ost', XK:'ost', BA:'ost', SI:'ost', UA:'ost', MD:'ost',
  US:'inter', CA:'inter', TH:'inter', JP:'inter', CN:'inter', KR:'inter',
  QA:'inter', AE:'inter', IL:'inter', IN:'inter',
};

// På GitHub Pages går API-kall til Cloudflare-workeren; lokalt/på workers.dev er de same-origin
const API_BASE = location.hostname.endsWith('github.io') ? 'https://sas-flysok.dreampodcast.workers.dev' : '';

const $ = (id) => document.getElementById(id);
let direction = 'D';
let lastFlights = [];
let lastQuery = null;
const hiddenRegions = new Set();   // regioner brukeren har skrudd av

function nameOf(f) { return f.otherName || (AIRPORTS[f.otherIata] || [])[0] || f.otherIata || ''; }
function regionOf(iata) {
  const cc = (AIRPORTS[iata] || [])[1];
  return COUNTRY_REGION[cc] || 'annet';
}

/* ------------------------------ Init ------------------------------ */

function initFromUrl() {
  const p = new URLSearchParams(location.search);
  const localDate = (d) => new Intl.DateTimeFormat('sv-SE', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  const today = new Date();
  const week = new Date(today.getTime() + 7 * 86400000);
  $('from').value = p.get('from') || localDate(today);
  $('to').value = p.get('to') || localDate(week);
  const wanted = p.get('airport');
  const supported = wanted && [...$('airport').options].some((o) => o.value === wanted);
  if (supported) $('airport').value = wanted;
  if (['D', 'A', 'B'].includes(p.get('direction'))) setDirection(p.get('direction'));
  if (supported) {
    search();
  } else if (wanted) {
    $('messages').innerHTML = `<div class="warning">Flyplassen «${esc(wanted)}» støttes ikke. Velg en flyplass og søk på nytt.</div>`;
  }
}

$('dir-d').addEventListener('click', () => setDirection('D'));
$('dir-a').addEventListener('click', () => setDirection('A'));
$('dir-b').addEventListener('click', () => setDirection('B'));
function setDirection(d) {
  direction = d;
  $('dir-d').classList.toggle('active', d === 'D');
  $('dir-a').classList.toggle('active', d === 'A');
  $('dir-b').classList.toggle('active', d === 'B');
}

$('search').addEventListener('click', search);
for (const el of [$('airport'), $('from'), $('to')]) {
  el.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
}
$('destfilter').addEventListener('input', renderList);
$('chips-all').addEventListener('click', () => { hiddenRegions.clear(); syncChips(); renderList(); });
$('chips-none').addEventListener('click', () => {
  for (const r of REGION_DEFS) hiddenRegions.add(r.key);
  syncChips(); renderList();
});

/* ------------------------------ Søk ------------------------------ */

let searchSeq = 0;

async function search() {
  const airport = $('airport').value;
  const from = $('from').value;
  const to = $('to').value;
  const btn = $('search');
  const messages = $('messages');

  if (!from || !to) { messages.innerHTML = '<p class="status">Velg fra- og til-dato.</p>'; return; }

  const seq = ++searchSeq;
  btn.disabled = true;
  btn.textContent = 'Søker…';
  messages.innerHTML = '<p class="status">Henter flygninger…</p>';
  $('results').innerHTML = '';
  $('filterbar').classList.remove('visible');

  history.replaceState(null, '', `?airport=${airport}&from=${from}&to=${to}&direction=${direction}`);

  try {
    const res = await fetch(`${API_BASE}/api/flights?airport=${airport}&from=${from}&to=${to}&direction=${direction}`);
    const data = await res.json();
    if (seq !== searchSeq) return; // et nyere søk er startet – ikke overskriv
    if (!res.ok) {
      messages.innerHTML = `<div class="warning">${esc(data.error || 'Noe gikk galt')}</div>`;
      return;
    }
    lastFlights = data.flights.map((f) => ({ ...f, region: regionOf(f.otherIata) }));
    lastQuery = data;

    let html = '';
    for (const w of data.warnings || []) html += `<div class="warning">${esc(w)}</div>`;
    messages.innerHTML = html;

    $('filterbar').classList.toggle('visible', lastFlights.length > 0);
    renderChips();
    renderList();
  } catch (e) {
    if (seq !== searchSeq) return;
    messages.innerHTML = `<div class="warning">Klarte ikke å kontakte API-et: ${esc(e.message)}</div>`;
  } finally {
    if (seq === searchSeq) {
      btn.disabled = false;
      btn.textContent = 'Søk';
    }
  }
}

/* ---------------------------- Filtrering ---------------------------- */

function activeFlights() {
  const q = $('destfilter').value.trim().toLowerCase();
  return lastFlights.filter((f) => {
    if (hiddenRegions.has(f.region)) return false;
    if (!q) return true;
    return (
      nameOf(f).toLowerCase().includes(q) ||
      (f.otherIata || '').toLowerCase().includes(q) ||
      f.flightId.toLowerCase().includes(q)
    );
  });
}

function renderChips() {
  const counts = {};
  for (const f of lastFlights) counts[f.region] = (counts[f.region] || 0) + 1;

  let out = '';
  for (const r of REGION_DEFS) {
    const n = counts[r.key] || 0;
    if (!n) continue;
    const active = !hiddenRegions.has(r.key);
    out += `<button type="button" class="chip ${active ? 'active' : ''}" data-region="${r.key}"
      aria-pressed="${active}">${esc(r.label)} <span class="n">(${n})</span></button>`;
  }
  $('chips').innerHTML = out;
  for (const btn of $('chips').querySelectorAll('.chip')) {
    btn.addEventListener('click', () => {
      const key = btn.dataset.region;
      if (hiddenRegions.has(key)) hiddenRegions.delete(key); else hiddenRegions.add(key);
      syncChips();
      renderList();
    });
  }
}

// Oppdaterer chip-tilstand uten å bygge DOM på nytt, så tastaturfokus bevares
function syncChips() {
  for (const btn of $('chips').querySelectorAll('.chip')) {
    const active = !hiddenRegions.has(btn.dataset.region);
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', String(active));
  }
}

/* ---------------------------- Visning ---------------------------- */

function renderList() {
  const results = $('results');
  if (!lastQuery) return;
  const data = lastQuery;
  const flights = activeFlights();
  const dirWord = data.direction === 'D' ? 'avganger' : data.direction === 'A' ? 'ankomster' : 'flygninger';
  const prep = data.direction === 'D' ? 'fra' : data.direction === 'A' ? 'til' : 'ved';

  if (!lastFlights.length) {
    results.innerHTML = `<div class="empty">Ingen SAS-${dirWord} funnet ${prep} ${esc(data.airport)} i perioden ${esc(data.from)} – ${esc(data.to)}.</div>`;
    return;
  }
  if (!flights.length) {
    results.innerHTML = `<div class="empty">Alle ${lastFlights.length} flygningene er filtrert bort. Juster filtrene over.</div>`;
    return;
  }

  const fmtTime = new Intl.DateTimeFormat('nb-NO', { timeZone: 'Europe/Oslo', hour: '2-digit', minute: '2-digit' });
  const fmtDay = new Intl.DateTimeFormat('nb-NO', { timeZone: 'Europe/Oslo', weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const fmtDayKey = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Europe/Oslo', year: 'numeric', month: '2-digit', day: '2-digit' });

  const byDay = new Map();
  for (const f of flights) {
    const d = new Date(f.scheduledUtc);
    const key = fmtDayKey.format(d);
    if (!byDay.has(key)) byDay.set(key, { label: fmtDay.format(d), flights: [] });
    byDay.get(key).flights.push(f);
  }

  const showDirCol = data.direction === 'B';
  const destinations = new Set(flights.map((f) => f.otherIata || nameOf(f)));
  const filtered = flights.length !== lastFlights.length;

  const singular = data.direction === 'D' ? 'avgang' : data.direction === 'A' ? 'ankomst' : 'flygning';
  const noun = !filtered && flights.length === 1 ? singular : dirWord;
  let out = `
    <div class="summary">
      <strong>${filtered ? `Viser ${flights.length} av ${lastFlights.length}` : flights.length} SAS-${noun}
        · ${esc(data.airport)} · ${esc(data.from)} – ${esc(data.to)} · ${destinations.size} ${destinations.size === 1 ? 'flyplass' : 'flyplasser'}</strong>
      <button id="csv" type="button">Last ned CSV</button>
    </div>`;

  for (const [, day] of byDay) {
    out += `<div class="day"><h2>${esc(cap(day.label))}</h2><table>
      <thead><tr><th>Tid</th><th>Flight</th>${showDirCol ? '<th>Retning</th>' : ''}
      <th>${data.direction === 'A' ? 'Fra' : showDirCol ? 'Fra/til' : 'Til'}</th><th>Gate</th><th>Status</th><th>Pris</th></tr></thead><tbody>`;
    for (const f of day.flights) {
      const place = nameOf(f);
      const via = f.via ? ` <span style="color:var(--muted)">via ${esc((AIRPORTS[f.via] || [])[0] || f.via)}</span>` : '';
      const dirCell = showDirCol
        ? `<td><span class="dir-badge ${f.direction === 'D' ? 'dir-d' : 'dir-a'}">${f.direction === 'D' ? 'Avgang' : 'Ankomst'}</span></td>`
        : '';
      const url = priceUrl(f);
      const priceCell = url
        ? `<td><a class="price-link" href="${url}" target="_blank" rel="noopener">Sjekk pris ↗</a></td>`
        : '<td class="price-na">–</td>';
      out += `<tr>
        <td class="time">${fmtTime.format(new Date(f.scheduledUtc))}</td>
        <td class="flight">${esc(f.flightId)}</td>
        ${dirCell}
        <td>${esc(place)} <span style="color:var(--muted)">${f.otherIata && place !== f.otherIata ? '(' + esc(f.otherIata) + ')' : ''}</span>${via}</td>
        <td>${esc(f.gate || '–')}</td>
        <td><span class="st ${statusClass(f.status)}">${esc(f.status)}</span></td>
        ${priceCell}
      </tr>`;
    }
    out += '</tbody></table></div>';
  }
  results.innerHTML = out;
  $('csv').addEventListener('click', downloadCsv);
}

function statusClass(status) {
  if (/kansellert|innstilt|slettet/i.test(status)) return 'st-bad';
  if (/avgått|ankommet|landet|aktiv/i.test(status)) return 'st-ok';
  return 'st-plan';
}

// Google Flights-søk (SAS, rute + dato) for fremtidige, bookbare avganger.
// Fortid/allerede avgåtte fly kan ikke bookes, så da vises ingen lenke.
function priceUrl(f) {
  if (!f.otherIata || new Date(f.scheduledUtc) <= new Date()) return null;
  const origin = f.direction === 'D' ? lastQuery.airport : f.otherIata;
  const dest = f.direction === 'D' ? f.otherIata : lastQuery.airport;
  if (!origin || !dest || origin === dest) return null;
  const date = new Intl.DateTimeFormat('sv-SE', {
    timeZone: 'Europe/Oslo', year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date(f.scheduledUtc));
  const q = `SAS flights from ${origin} to ${dest} on ${date}`;
  return 'https://www.google.com/travel/flights?q=' + encodeURIComponent(q);
}

function downloadCsv() {
  const flights = activeFlights();
  if (!flights.length) return;
  const fmt = new Intl.DateTimeFormat('sv-SE', {
    timeZone: 'Europe/Oslo', year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  const rows = [['Dato/tid (lokal)', 'Flight', 'Retning', 'Flyplass', 'IATA', 'Region', 'Gate', 'Terminal', 'Status', 'Pris (lenke)']];
  const regionLabel = Object.fromEntries(REGION_DEFS.map((r) => [r.key, r.label]));
  for (const f of flights) {
    rows.push([
      fmt.format(new Date(f.scheduledUtc)),
      f.flightId,
      f.direction === 'D' ? 'Avgang' : 'Ankomst',
      nameOf(f),
      f.otherIata || '',
      regionLabel[f.region] || '',
      f.gate || '',
      f.terminal || '',
      f.status,
      priceUrl(f) || '',
    ]);
  }
  const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sas-${lastQuery.airport}-${lastQuery.from}-${lastQuery.to}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

initFromUrl();
</script>
